<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Document Classifier</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <main class="container">
        <section class="card">
            <h1>Smart Document Classifier</h1>
            <p class="subtitle">Upload and classify files, then search extracted document text.</p>

            <div class="search-bar">
                <input type="text" id="searchInput" class="search-input" placeholder="Search inside document text (example: invoice)">
                <button class="btn" id="searchBtn" type="button">Search</button>
            </div>

            <div class="upload-area" id="dropArea">
                <div class="upload-icon" aria-hidden="true">FILE</div>
                <h2>Drag and drop files here</h2>
                <p>or click to browse from your device</p>
                <input type="file" id="fileInput" multiple accept=".pdf,.doc,.docx,.txt,.png,.jpg,.jpeg" hidden>
                <button class="btn" id="browseBtn" type="button">Browse Files</button>
            </div>

            <div class="file-list" id="fileList"></div>
            <button class="btn btn-primary" id="classifyBtn" type="button" disabled>Classify All Files</button>
        </section>

        <section class="card results" id="resultsSection" hidden>
            <h2>Results</h2>
            <div class="loading" id="loadingIndicator" hidden>
                <span class="spinner" aria-hidden="true"></span>
                <span id="loadingText">Loading...</span>
            </div>
            <div id="resultsContainer"></div>

            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>File</th>
                            <th>Location</th>
                            <th>Size</th>
                            <th>MIME Type</th>
                        </tr>
                    </thead>
                    <tbody id="resultsTableBody"></tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="{{ url_for('static', filename='js/main.js') }}" defer></script>
    
</body>
</html>
